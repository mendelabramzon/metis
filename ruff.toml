# Ruff: single tool for lint + format (ADR 0004).
target-version = "py312"
line-length = 100

# Alembic migration scripts use generated boilerplate; don't lint them.
extend-exclude = ["**/migrations/versions", "**/migrations/env.py"]

# First-party source roots, for import sorting and resolution.
src = [
    "packages/metis-protocol/src",
    "packages/metis-core/src",
    "packages/metis-ingestion/src",
    "packages/metis-maintainer/src",
    "packages/metis-runtime/src",
    "packages/metis-skills/src",
    "services/gateway/src",
    "services/ingest-worker/src",
    "services/maintainer-worker/src",
    "services/runtime-worker/src",
    "eval/src",
    "deploy/src",
    "tests",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "PT",   # flake8-pytest-style
    "RUF",  # ruff-specific
]

[lint.per-file-ignores]
# conftest may set environment variables before importing test infrastructure.
"**/conftest.py" = ["E402"]

[lint.isort]
known-first-party = [
    "metis_protocol",
    "metis_core",
    "metis_ingestion",
    "metis_maintainer",
    "metis_runtime",
    "metis_skills",
    "metis_gateway",
    "metis_ingest_worker",
    "metis_maintainer_worker",
    "metis_runtime_worker",
    "metis_eval",
    "metis_deploy",
]

[format]
docstring-code-format = true
