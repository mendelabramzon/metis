; mypy strict is the CI type gate (ADR 0005).
;
; Each member uses a src/ layout. We treat every src/ directory as an import
; base so `src/metis_protocol/__init__.py` resolves to the module `metis_protocol`
; without relying on how editable installs are wired.
[mypy]
python_version = 3.12
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
namespace_packages = True
explicit_package_bases = True
plugins = pydantic.mypy
mypy_path =
    packages/metis-protocol/src,
    packages/metis-core/src,
    packages/metis-ingestion/src,
    packages/metis-maintainer/src,
    packages/metis-runtime/src,
    packages/metis-skills/src,
    services/gateway/src,
    services/ingest-worker/src,
    services/maintainer-worker/src,
    services/runtime-worker/src

; Note: mypy gates package/service source only (`make typecheck`), not tests.
; When tests are added to the type gate in a later stage, add overrides here for
; untyped third-party tooling such as import-linter and grimp.
