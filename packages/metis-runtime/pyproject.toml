[project]
name = "metis-runtime"
version = "0.0.0"
description = "Metis user-facing intelligence: chat, retrieval, context packing, skills"
requires-python = ">=3.12"
dependencies = [
    "metis-protocol",
    "metis-core",
    "metis-skills",
    "jsonschema>=4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metis_runtime"]
