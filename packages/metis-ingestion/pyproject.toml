[project]
name = "metis-ingestion"
version = "0.0.0"
description = "Metis evidence production: connectors, parsers, segmentation, extraction"
requires-python = ">=3.12"
dependencies = [
    "metis-protocol",
    "metis-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metis_ingestion"]
