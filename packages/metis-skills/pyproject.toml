[project]
name = "metis-skills"
version = "0.0.0"
description = "Metis reusable capabilities: Python skill packages, templates, fixtures"
requires-python = ">=3.12"
dependencies = [
    "metis-protocol",
    "pyyaml>=6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metis_skills"]
