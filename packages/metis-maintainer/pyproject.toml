[project]
name = "metis-maintainer"
version = "0.0.0"
description = "Metis memory maintenance: contradictions, consolidation, foresight, wiki patches"
requires-python = ">=3.12"
dependencies = [
    "metis-protocol",
    "metis-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metis_maintainer"]
