# Alembic config for the `alembic` CLI. Tests build the Config programmatically
# (see metis_core.dev.testing) and override sqlalchemy.url with the live database.
[alembic]
script_location = src/metis_core/migrations
prepend_sys_path = src
sqlalchemy.url = postgresql+asyncpg://metis:metis@localhost:5432/metis

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
