# Local dev stack for metis-core: Postgres (with pgvector) + MinIO.
#   docker compose -f src/metis_core/dev/docker-compose.dev.yml up -d
# Then point CoreSettings at it (defaults already match):
#   METIS_CORE_DATABASE_URL=postgresql+asyncpg://metis:metis@localhost:5432/metis
#   METIS_CORE_OBJECT_STORE_ENDPOINT_URL=http://localhost:9000
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: metis
      POSTGRES_PASSWORD: metis
      POSTGRES_DB: metis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metis"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - metis_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - metis_miniodata:/data

volumes:
  metis_pgdata:
  metis_miniodata:
