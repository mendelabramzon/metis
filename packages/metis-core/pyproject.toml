[project]
name = "metis-core"
version = "0.0.0"
description = "Metis durable substrate: stores, audit, jobs, policy enforcement"
requires-python = ">=3.12"
dependencies = [
    "metis-protocol",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "boto3>=1.34",
    "pgvector>=0.3",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "anthropic>=0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metis_core"]
