[project]
name = "metis-core"
version = "0.0.0"
description = "Metis durable substrate: stores, audit, jobs, policy enforcement"
requires-python = ">=3.12"
dependencies = [
    "metis-protocol",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/metis_core"]
