name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --all-packages

      # Mirrors `make check`, split into steps for readable CI logs.
      - name: Boundaries (import-linter)
        run: make boundaries

      - name: Lint (ruff)
        run: make lint

      - name: Typecheck (mypy --strict)
        run: make typecheck

      - name: Test (pytest)
        run: make test
