# Local model profile: a CPU Ollama runtime. No data leaves the node, so restricted and
# non-restricted data both route here (Stage 4 router). Overlay onto the base stack:
#   docker compose -f docker-compose.yml -f compose/profiles.local.yml up
name: metis

services:
  model-runtime:
    image: ollama/ollama:latest
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  gateway:
    environment:
      METIS_MODEL_PROFILE: local
      METIS_LOCAL_MODEL_ENDPOINT: http://model-runtime:11434/v1
    depends_on:
      model-runtime:
        condition: service_healthy

  runtime-worker:
    environment:
      METIS_MODEL_PROFILE: local
      METIS_LOCAL_MODEL_ENDPOINT: http://model-runtime:11434/v1

  maintainer-worker:
    environment:
      METIS_MODEL_PROFILE: local
      METIS_LOCAL_MODEL_ENDPOINT: http://model-runtime:11434/v1

volumes:
  ollamadata:
